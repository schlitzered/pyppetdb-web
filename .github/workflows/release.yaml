name: Build and Release

on:
  push:
    tags:
      - 'v*' # Reagiert auf v1.0, v2.1.4, etc.

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install and Build
        run: |
          npm install
          npm run build

      - name: Create Release Archive
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          tar -czf pyppetdb-web-${VERSION}.tar.gz -C dist .

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: pyppetdb-web-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}